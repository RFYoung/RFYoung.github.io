<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-copy">
      &copy; {{ 'now' | date: "%Y" }} {{ site.author | default: site.title | escape }}. Built with Precision.
    </div>
    <div class="footer-links">
      {%- if site.github_username -%}
      <a class="footer-link" href="https://github.com/{{ site.github_username }}">GitHub</a>
      {%- endif -%}
      {%- if site.scholar_id -%}
      <a class="footer-link" href="https://scholar.google.com/citations?user={{ site.scholar_id }}">Scholar</a>
      {%- endif -%}
      {%- if site.leetcode_username -%}
      <a class="footer-link" href="https://leetcode.com/{{ site.leetcode_username }}">LeetCode</a>
      {%- endif -%}
      <a class="footer-link" href="{{ "/feed.xml" | relative_url }}">RSS</a>
    </div>
  </div>
</footer>
